  <body>
    <div id="game">
      <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
      <canvas id="loader" oncontextmenu="event.preventDefault()"></canvas>
      <a id="fullscreen" href="javascript:toggleFullScreen();" class="gofullscreen" />
    </div>

    <script type="text/javascript">
      var game = document.getElementById("game");
      var canvas = document.getElementById("canvas");
      var loader = document.getElementById("loader");
      var fullscreen = document.getElementById("fullscreen");
      function goFullscreen(e) {
        if (game.requestFullscreen)
          game.requestFullscreen();
        else if (game.webkitRequestFullscreen)
          game.webkitRequestFullscreen();
        else if (game.msRequestFullscreen)
          game.msRequestFullscreen();
        fullscreen.classList.remove("gofullscreen");
        fullscreen.classList.add("gowindowed");
        drawProgress();
      }
      function goWindowed() {
        if (document.exitFullscreen)
          document.exitFullscreen();
        else if (document.webkitExitFullscreen)
          document.webkitExitFullscreen();
        else if (document.msExitFullscreen)
          document.msExitFullscreen();
        fullscreen.classList.add("gofullscreen");
        fullscreen.classList.remove("gowindowed");
        drawProgress();
      }
      function toggleFullScreen() {
        let is = document.isFullscreen;
        if (typeof(document.isFullscreen === undefined)) 
          is = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
        if (is)
          goWindowed();
        else
          goFullscreen();
      }
      var loaded = 0;
      var caption;
      function drawProgress(perc) {
        if (typeof perc == "number")
          loaded = Math.max(perc, loaded);
        else if (typeof perc == "string")
          caption = perc;
        let w = window.innerWidth;
        let h = window.innerHeight;
        loader.width = w;
        loader.height = h;
        let ctx = loader.getContext("2d");

        ctx.fillStyle = "rgb(142,195,227)";
        ctx.fillRect(0, 0, w, h);

        ctx.fillStyle = "rgb(11, 86, 117)";
        ctx.fillRect(w/2 - 200, h/2 - 25, 400, 50);
        ctx.fillStyle = "rgb(142,195,227)";
        ctx.fillRect(w/2 - 198, h/2 - 23, 396*perc, 46);
        ctx.fillStyle = "rgb(11, 86, 117)";
        ctx.font = "24px Arial";
        ctx.textAlign = "center";
        if (caption)
          ctx.fillText(caption, w/2, h/2 + 60);
          
        if (perc >= 1) {
          loader.style.display = "none";
          canvas.style.display = "block";
          if (!NOCTRLS)
            fullscreen.style.display = "block";
        }
      }
      drawProgress("Powered by Emscripten and LÖVE2D");
      window.onresize = function() { drawProgress(); };
      window.onload = function() { window.focus(); };
      window.onclick = function() { window.focus(); };

      window.addEventListener("keydown", function(e) {
        // space and arrow keys
        if([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
          e.preventDefault();
        }
      }, false);
      
      // fetch arguments from url
      var url = new URL(window.location.href);
      var GAMEPATH = url.searchParams.get("g") || "nogame.love";
      var MEMORY = parseInt(url.searchParams.get("m"));
      // sanity check
      if (navigator.deviceMemory)
        MEMORY = Math.min(MEMORY, navigator.deviceMemory*1e+9);
      if (!MEMORY) {
        // allocate 1/8 of the total system memory
        MEMORY = (navigator.deviceMemory || 1)*1e+9/8;
        console.log("allocating "+MEMORY+" bytes of memory");
      }
      var NOCACHE = parseInt(url.searchParams.get("r"));
      var NOCTRLS = parseInt(url.searchParams.get("f"));
      var COMPAT = url.searchParams.get("c");
      if (!COMPAT === undefined) {
        // enable compatibility mode for mobile browsers
        var ua = navigator.userAgent;
        COMPAT = /Android|webOS|iPhone|iPad|iPod/i.test(ua);
      }
      if (COMPAT)
        console.log("running in compatibility mode");

      var Module = {
        arguments: [GAMEPATH],
        INITIAL_MEMORY: MEMORY,
        printErr: console.error.bind(console),
        canvas: (function() {
          var canvas = document.getElementById("canvas");

          // As a default initial behavior, pop up an alert when webgl context is lost. To make your
          // application robust, you may want to override this behavior before shipping!
          // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
          canvas.addEventListener("webglcontextlost", function(e) { alert("WebGL context lost. You will need to reload the page."); e.preventDefault(); }, false);

          return canvas;
        })(),
        setStatus: function(perc) {
          if (typeof perc == "number")
            drawProgress(perc/2 + 0.5);
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function(left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          drawProgress((this.totalDependencies-left)/this.totalDependencies/2);
        }
      };
      window.onerror = function(event) {
        // switch to compatibility mode if any errors occur
        if (!COMPAT) {
          window.location.href = "?c=1&g="+GAMEPATH+"&m="+MEMORY;
          return;
        }
        // TODO: do not warn on ok events like simulating an infinite loop or exitStatus
        drawProgress("Loading failed");
        Module.setStatus = function(text) {
          if (text) Module.printErr("[post-exception status] " + text);
        };
      };

      var applicationLoad = function(e) {
        Love(Module);
      }
      
      let po = document.createElement("script");
      po.async = true;
      po.type = "text/javascript";
      po.src = (COMPAT) ? "love.comp.js" : "love.js";
      po.onload = applicationLoad;
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(po, s);
    </script>
    <script type="text/javascript" src="game.js"></script>
